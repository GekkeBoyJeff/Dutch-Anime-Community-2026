name: Test SSH + rsync (diagnostic)

# Manual-only probe: confirms the DirectAdmin box accepts key-based SSH on 2222,
# has rsync, and prints the real docroot path (→ the REMOTE_DIR for the deploy).
# Uses the SSH_PRIVATE_KEY secret; touches nothing on the server.
# Requires the matching public key to be pasted AND authorized in DirectAdmin.
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.FTP_HOST }}
      SSH_USER: ${{ secrets.FTP_USER }}
      SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_PORT: '2222'
    steps:
      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Write private key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: SSH reachable, rsync present, discover docroot
        run: |
          ssh -p "$SSH_PORT" -i ~/.ssh/id_ed25519 \
            -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 \
            "$SSH_USER@$SSH_HOST" \
            'echo "=== CONNECTED ==="; echo "rsync: $(command -v rsync || echo NOT-FOUND)"; echo "HOME=$HOME"; echo "PWD=$(pwd)"; echo "=== docroots under ~/domains ==="; ls -d ~/domains/*/public_html 2>/dev/null || echo "(no ~/domains/*/public_html found)"; echo "=== END ==="'

      - name: End-to-end rsync-over-SSH dry-run (writes nothing, -n)
        run: |
          mkdir -p _probe && echo "rsync probe" > _probe/_probe.txt
          rsync -azvn \
            -e "ssh -p $SSH_PORT -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20" \
            _probe/ "$SSH_USER@$SSH_HOST:_rsync_probe_dir/"
          echo "rsync transport OK (dry-run, no files written)"
