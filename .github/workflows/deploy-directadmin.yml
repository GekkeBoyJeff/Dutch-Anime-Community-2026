name: Deploy to DirectAdmin

on:
  repository_dispatch:
    types: [publish]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Strip runtime route handlers (static host cannot run them)
        run: rm -rf src/app/api
      - name: Build static export from Supabase
        env:
          HOST_TYPE: static
          NEXT_PUBLIC_BASE_PATH: ''
          NEXT_PUBLIC_SITE_URL: ${{ secrets.SITE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run build
      - name: FTP upload out/ to DirectAdmin
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Explicit FTPS (encrypted). If your host has no valid TLS cert, change to `ftp`.
          protocol: ftps
          local-dir: ./out/
          # FTP_REMOTE_DIR must end with a slash (the deploy secret is normalized to).
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}
          # No clean-slate: the action keeps a sync-state manifest on the server and uploads ONLY
          # changed files (and deletes removed ones), instead of re-uploading the whole docroot every
          # deploy. The first run after this change is still full; every run after is incremental.
