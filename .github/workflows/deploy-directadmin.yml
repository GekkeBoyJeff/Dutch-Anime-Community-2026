name: Deploy to DirectAdmin

on:
  repository_dispatch:
    types: [publish]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # The lockfile is generated by npm 11 (platform-aware optional deps); Node 22 ships npm 10,
      # whose stricter `npm ci` rejects it. Align CI's npm with the lockfile generator.
      - run: npm i -g npm@11
      - run: npm ci
      - name: Strip runtime route handlers (static host cannot run them)
        run: rm -rf src/app/api
      - name: Build static export from Supabase
        env:
          HOST_TYPE: static
          NEXT_PUBLIC_BASE_PATH: ''
          NEXT_PUBLIC_SITE_URL: ${{ secrets.SITE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run build
      - name: Deploy out/ to DirectAdmin via rsync over SSH
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          # Docroot is relative to the SSH home (/home/<user>); the account has a separate
          # test.<domain> docroot, so this path is explicit to avoid deploying to the wrong one.
          REMOTE_DIR: ${{ secrets.REMOTE_DIR }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # -a archive, -z compress, --delete mirrors out/ exactly (removed pages don't linger).
          # Trailing slash on ./out/ syncs its CONTENTS, not the folder itself. SSH is on port 22.
          rsync -az --delete \
            -e "ssh -p 22 -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20" \
            ./out/ "$SSH_USER@$SSH_HOST:$REMOTE_DIR"
