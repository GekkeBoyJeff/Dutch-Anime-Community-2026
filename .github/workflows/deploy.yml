name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HOST_TYPE: static
      NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
      NEXT_PUBLIC_SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install --no-audit --no-fund
      - run: npm run build-storybook
      # Route handlers can't run on a static host. The builder is development-only tooling, but when
      # NEXT_PUBLIC_ENABLE_BUILDER is true, it is compiled statically alongside the site.
      - run: rm -rf src/app/api
      - run: NEXT_PUBLIC_ENABLE_BUILDER=true npm run build

      - name: Combine site + Storybook
        run: |
          mkdir -p out/storybook
          cp -r storybook-static/. out/storybook/
          touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
